<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mastery OS | JEE Neural Tutor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="flex flex-col h-screen overflow-hidden p-4 md:p-6 gap-4">

    <!-- Top Navigation -->
    <header class="flex justify-between items-center shrink-0">
        <div class="flex items-center gap-4">
            <div class="p-3 bg-cyan-500/10 rounded-xl border border-cyan-500/20 shadow-[0_0_20px_rgba(6,182,212,0.15)]">
                <i data-lucide="brain-circuit" class="text-cyan-400 w-7 h-7"></i>
            </div>
            <div>
                <h1 class="text-xl font-black tracking-tighter leading-none">NEURAL <span class="text-cyan-400">LABS</span></h1>
                <p class="text-[10px] mono text-gray-500 uppercase mt-1 tracking-widest font-bold">Interactive Whiteboard Engine v6.0</p>
            </div>
        </div>
        
        <div class="flex gap-4 items-center">
            <div id="connection-status" class="glass-panel px-4 py-2 rounded-full flex items-center gap-3">
                <div id="status-indicator" class="w-2.5 h-2.5 rounded-full bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.5)]"></div>
                <span id="status-text" class="text-[10px] mono uppercase font-black text-gray-400 tracking-tighter">System Offline</span>
            </div>
        </div>
    </header>

    <div class="flex-1 flex gap-6 min-h-0">
        <!-- Left Sidebar: Tutor & Interaction -->
        <div class="w-80 flex flex-col gap-6 shrink-0">
            <div class="teacher-view group relative">
                <div class="scanline"></div>
                <video id="video-element" autoplay playsinline class="hidden"></video>
                <div id="video-placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-center p-8 bg-gradient-to-br from-slate-900 to-black">
                    <div class="w-20 h-20 rounded-full bg-slate-800/50 border border-slate-700 flex items-center justify-center mb-6 relative">
                        <i data-lucide="user" class="text-slate-500 w-10 h-10"></i>
                        <div class="absolute inset-0 rounded-full border border-cyan-500/20 animate-ping"></div>
                    </div>
                    <h3 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] mb-2">Awaiting Neural Link</h3>
                    <p class="text-[10px] text-slate-600 mono leading-relaxed uppercase">Biometric verification required</p>
                </div>
                
                <div class="absolute bottom-6 inset-x-6 flex gap-3">
                    <button id="mic-btn" class="w-12 h-12 rounded-xl glass-panel flex items-center justify-center text-white hover:text-cyan-400 transition-all border border-white/5 hover:border-cyan-400/30 group/mic">
                        <i data-lucide="mic" class="w-6 h-6 group-hover/mic:scale-110 transition-transform"></i>
                    </button>
                    <button id="start-btn" class="flex-1 h-12 bg-cyan-500 text-black font-black rounded-xl text-[11px] uppercase tracking-[0.15em] hover:bg-cyan-400 transition-all shadow-[0_0_20px_rgba(6,182,212,0.3)] active:scale-[0.98]">
                        Initialize AI
                    </button>
                </div>
            </div>

            <!-- Resolution Log -->
            <div class="flex-1 glass-panel rounded-3xl p-5 flex flex-col overflow-hidden relative">
                <div class="flex items-center justify-between mb-4 border-b border-white/5 pb-3">
                    <span class="text-[10px] font-black text-cyan-400 mono uppercase tracking-widest">Process Stream</span>
                    <i data-lucide="activity" class="w-3 h-3 text-cyan-400/50"></i>
                </div>
                <div id="chat-log" class="flex-1 overflow-y-auto space-y-4 text-[12px] pr-2 custom-scrollbar">
                    <div class="text-gray-500 italic opacity-50 text-[10px] mono uppercase">System ready. State: Idle</div>
                </div>
                <div id="thinking" class="hidden h-8 mt-4 flex items-center gap-3 bg-cyan-500/5 border border-cyan-500/10 rounded-lg px-3">
                    <div class="flex gap-1">
                        <span class="w-1 h-1 bg-cyan-400 rounded-full animate-bounce"></span>
                        <span class="w-1 h-1 bg-cyan-400 rounded-full animate-bounce [animation-delay:0.2s]"></span>
                        <span class="w-1 h-1 bg-cyan-400 rounded-full animate-bounce [animation-delay:0.4s]"></span>
                    </div>
                    <span id="thinking-text" class="text-[9px] mono font-bold text-cyan-400 uppercase tracking-widest">Processing...</span>
                </div>
            </div>
        </div>

        <!-- Main Content: Canvas Area -->
        <div class="flex-1 flex flex-col gap-6">
            <div class="flex items-center gap-3 shrink-0">
                <div class="flex gap-1 p-1 bg-white/5 rounded-xl border border-white/10">
                    <button class="px-6 py-2.5 rounded-lg bg-cyan-500 text-black text-[11px] font-black uppercase tracking-widest transition-all">Neural Whiteboard</button>
                    <button id="toggle-resource" class="px-6 py-2.5 rounded-lg text-white/40 hover:text-white text-[11px] font-bold uppercase tracking-widest transition-all">Resource Lab</button>
                </div>
                <div class="ml-auto flex gap-4">
                    <button id="clear-canvas" class="flex items-center gap-2 px-4 py-2 text-[10px] text-gray-500 hover:text-red-400 mono uppercase font-bold tracking-tighter transition-colors">
                        <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                        Clear Board
                    </button>
                </div>
            </div>

            <div class="flex-1 canvas-container shadow-[0_0_50px_rgba(0,0,0,0.5)]">
                <div id="writing-status" class="writing-indicator mono flex items-center gap-3">
                    <div class="relative w-2 h-2">
                        <span class="absolute inset-0 rounded-full bg-cyan-400 animate-ping"></span>
                        <span class="relative block w-2 h-2 rounded-full bg-cyan-400"></span>
                    </div>
                    <span class="tracking-[0.2em]">TEACHER IS WRITING...</span>
                </div>
                <canvas id="whiteboard" class="w-full h-full"></canvas>
            </div>
        </div>
    </div>

    <!-- Resource Overlay -->
    <div id="resource-overlay">
        <div id="resource-header">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-purple-500/10 rounded-lg border border-purple-500/20">
                    <i data-lucide="microscope" class="text-purple-400 w-5 h-5"></i>
                </div>
                <h3 id="resource-title" class="text-sm font-black uppercase tracking-widest text-purple-400">Knowledge Laboratory</h3>
            </div>
            <button id="close-resource" class="p-2 hover:bg-white/5 rounded-full transition-colors">
                <i data-lucide="x" class="w-5 h-5 text-gray-400"></i>
            </button>
        </div>
        <div id="resource-content">
            <!-- PhET iframe or Wiki image will be injected here -->
            <div class="flex items-center justify-center h-full text-gray-600 italic mono text-xs uppercase">No active simulation</div>
        </div>
    </div>

    <!-- UI Overlays -->
    <div id="loading-overlay" class="fixed inset-0 z-[200] bg-black flex flex-col items-center justify-center transition-opacity duration-1000">
        <div class="relative w-32 h-32 mb-8">
            <div class="absolute inset-0 border-2 border-cyan-500/20 rounded-full animate-pulse"></div>
            <div class="absolute inset-2 border border-cyan-400 rounded-full border-t-transparent animate-spin"></div>
            <div class="absolute inset-0 flex items-center justify-center">
                <i data-lucide="zap" class="text-cyan-400 w-10 h-10 fill-cyan-400/20"></i>
            </div>
        </div>
        <h2 class="text-sm font-black tracking-[0.5em] text-white uppercase mb-2">Mastery OS v6.0</h2>
        <p class="text-[10px] mono text-cyan-400/50 uppercase tracking-widest">Optimizing Interactive Engines...</p>
    </div>

    <script type="module" src="app.js"></script>
    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loading-overlay');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 1000);
                lucide.createIcons();
            }, 1500);
        });
    </script>
</body>
</html>
